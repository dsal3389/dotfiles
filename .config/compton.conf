

# =-=-=-=-= SHADOWS =-=-=-=-=   

shadow = true;
shadow-opacity = 0.59;
shadow-radius  = 10;
shadow-offset-y = -7;
shadow-offset-x = -7;
clear-shadow = true;

shadow-red = 0.244;
shadow-green = 0.1;
shadow-blue = 0.179;

shadow-exclude = [
	# "class_g = 'somthing'"
];


# =-=-=-=-= FADING =-=-=-=-=   

fading = false
fade-in-step = 0.01;
fade-out-setp = 0.01;

fade-exclude = [];


# =-=-=-=-= OPACITY =-=-=-=-=

inactive-opacity = 0.7;
active-opactiy = 1.0;

focus-exclude = [];
opacity-rule = [
	# "80:class_g = 'something'"
	"90:class_g  = 'Brave-browser' && !focused",
	"95:class_g  = 'Chromium' && !focused",
	"90:class_g  = 'Firefox' && !focused",
	"95:class_g  = 'Popcorn-Time' && !focused",
	"90:class_g  = 'Spotify' && !focused",
	"40:class_g  = 'Kitty' && !focused"
];


# =-=-=-=-= BLUR =-=-=-=-=

blur-method = "kawase";
blur-size = 8;
blur-background-frame = true;
blur-background = true;
blur-background-fixed = true;
blur-kern = "3x3box";
blur-strength = 8;

blur-background-exclude = [
	# "window_type = 'something'"
];

vsync = "opengl";


# backend 

backend = "glx";
use-damage = false;
