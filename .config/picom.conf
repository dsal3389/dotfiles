

# =-=-=-=-= SHADOWS =-=-=-=-=   

shadow = true;
# shadow-opacity = .65;
shadow-radius  = 7;
shadow-offset-y = -7;
shadow-offset-x = -7;

shadow-red = 0;
shadow-green = 0;
shadow-blue = .30;

shadow-exclude = [
	# "class_g = 'somthing'"
];


# =-=-=-=-= FADING =-=-=-=-=   

fading = false
fade-in-step = 0.01;
fade-out-setp = 0.01;

fade-exclude = [];


# =-=-=-=-= OPACITY =-=-=-=-=

inactive-opacity = 0.7;
active-opactiy = 1.0;

focus-exclude = [];
opacity-rule = [
	# "80:class_g = 'something'"
];


# =-=-=-=-= BLUR =-=-=-=-=

blur-method = "dual_kawase";
blur-size = 10;
blur-background = true;
blur-background-fixed = true;
blur-kern = "3x3box";

blur-background-exclude = [
	"window_type = 'something'"
];

vsync = true;


# backend 

backend = "glx";
use-damage = false;
